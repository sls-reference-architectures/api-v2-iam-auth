service: api-v2-iam-auth-SUT

frameworkVersion: '4'

custom:
  stage: ${opt:stage, self:provider.stage}

provider:
  name: aws
  runtime: nodejs24.x
  stage: dev
  deploymentBucket:
    name: com.reference-architecture.deploys
    serverSideEncryption: AES256
  httpApi:
    useProviderTags: true
  tags:
    lumigo:auto-trace: true

plugins:
  - serverless-esbuild

functions:
  helloWorld:
    handler: src/helloHandler.handler
    events:
      - httpApi:
          method: get
          path: /hello
          authorizer:
            type: aws_iam
